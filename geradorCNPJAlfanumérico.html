<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Documentos Dev</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 450px; border: 1px solid #ddd; }
        h1 { color: #1a73e8; margin-bottom: 5px; font-size: 1.6rem; }
        #display { font-family: 'Courier New', Courier, monospace; font-size: 1.8rem; font-weight: bold; padding: 25px; background: #202124; border-radius: 12px; margin: 20px 0; color: #00ff41; letter-spacing: 2px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
        .grid { display: grid; gap: 12px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: all 0.2s; font-size: 0.9rem; text-transform: uppercase; }
        .btn-cpf { background: #673ab7; color: white; }
        .btn-normal { background: #5f6368; color: white; }
        .btn-alpha { background: #188038; color: white; }
        .btn-copy { background: #1a73e8; color: white; margin-top: 5px; }
        button:hover { opacity: 0.85; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .footer-info { font-size: 0.75rem; color: #70757a; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gerador de Documentos</h1>
    <p style="color: #5f6368; font-weight: 500;">Padrão Alfanumérico Receita Federal</p>

    <div id="display">---</div>

    <div class="grid">
        <button class="btn-cpf" onclick="generateCPF()">Gerar CPF</button>
        <div class="row">
            <button class="btn-normal" onclick="generateCNPJ(false)">CNPJ Numérico</button>
            <button class="btn-alpha" onclick="generateCNPJ(true)">CNPJ Alfanumérico</button>
        </div>
        <button class="btn-copy" onclick="copyToClipboard()">Copiar para Área de Transferência</button>
    </div>

    <div class="footer-info">
        Regra 2026: 12 posições alfanuméricas + 2 dígitos numéricos.<br>
        Cálculo baseado no valor ASCII - 48.
    </div>
</div>

<div id="toast" style="visibility: hidden; position: fixed; bottom: 30px; background: #323232; color: white; padding: 12px 24px; border-radius: 8px; font-size: 0.9rem;">Copiado com sucesso!</div>

<script>
    const calculateDV = (base, weights) => {
        let sum = 0;
        for (let i = 0; i < base.length; i++) {
            let val = base.charCodeAt(i) - 48;
            sum += val * weights[i];
        }
        let rest = sum % 11;
        return rest < 2 ? 0 : 11 - rest;
    };

    const generateCNPJ = (isAlpha) => {
        const pool = isAlpha ? "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ" : "0123456789";
        let base = "";

        // 1. Gera os 12 caracteres do corpo
        for (let i = 0; i < 12; i++) {
            base += pool.charAt(Math.floor(Math.random() * pool.length));
        }

        const w1 = [5, 4, 3, 2, 9, 8, 7, 6, 5, 4, 3, 2];
        const w2 = [6, 5, 4, 3, 2, 9, 8, 7, 6, 5, 4, 3, 2];

        // 2. Calcula os dígitos (sempre numéricos 0-9)
        const dv1 = calculateDV(base, w1);
        const dv2 = calculateDV(base + dv1, w2);

        const result = base + dv1 + dv2;

        // 3. Formatação Robusta: Pontuação nas posições fixas independente de ser letra ou número
        const formatted = result.substring(0,2) + '.' +
                          result.substring(2,5) + '.' +
                          result.substring(5,8) + '/' +
                          result.substring(8,12) + '-' +
                          result.substring(12,14);

        updateUI(formatted, isAlpha ? "#188038" : "#5f6368");
    };

    const generateCPF = () => {
        let n = Array.from({length: 9}, () => Math.floor(Math.random() * 10));
        const c = (b, m) => {
            let s = b.reduce((acc, v, i) => acc + (v * (m - i)), 0);
            let r = (s * 10) % 11;
            return r >= 10 ? 0 : r;
        };
        n.push(c(n, 10));
        n.push(c(n, 11));
        const f = n.join('').replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
        updateUI(f, "#673ab7");
    };

    function updateUI(text, color) {
        const display = document.getElementById('display');
        display.innerText = text;
        display.style.borderColor = color;
        display.style.boxShadow = `inset 0 2px 10px rgba(0,0,0,0.5), 0 0 10px ${color}44`;
    }

    function copyToClipboard() {
        const text = document.getElementById('display').innerText;
        if (text === "---") return;
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById("toast");
            toast.style.visibility = "visible";
            setTimeout(() => toast.style.visibility = "hidden", 2000);
        });
    }
</script>

</body>
</html>
